<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0D1B2A"/>
  <!-- Emerald gradient overlay -->
  <rect width="32" height="32" rx="7" fill="url(#bg-grad)" opacity="0.3"/>
  <!-- K icon: vertical bar (emerald) -->
  <rect x="8" y="7" width="3.5" height="18" rx="1.5" fill="#10B981"/>
  <!-- K icon: upper diagonal (gold) -->
  <path d="M11.5 16 L22 7.5" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- K icon: lower diagonal (gold) -->
  <path d="M11.5 16 L22 24.5" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>
</svg>
